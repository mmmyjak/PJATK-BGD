services:
  postgres:
    image: postgres:15-alpine
    container_name: bgd_postgres
    env_file:
      - ./.env
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=4", "-c", "max_wal_senders=4"]
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d
    networks:
      - bgd_projekt
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bgd_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bgd_pgadmin
    env_file:
      - ./.env
    ports:
      - "8080:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bgd_projekt
    volumes:
      - ./data/pgadmin:/var/lib/pgadmin

  pyspark:
    build:
      context: .
      dockerfile: Dockerfile.pyspark
    container_name: bgd_pyspark
    env_file:
      - ./.env
    environment:
      - POSTGRES_HOST=postgres
      - JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64
      - DBT_LOG_PATH=/app/data/dbt/logs
      - PATH=/usr/lib/jvm/java-21-openjdk-amd64/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bgd_projekt
    volumes:
      - ./src:/app/src
      - ./dbt:/app/dbt
      - ./data:/app/data
    command: sleep infinity

  kafka:
    image: apache/kafka:3.9.1
    container_name: bgd_kafka
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_NUM_PARTITIONS=1
      - KAFKA_CLUSTER_ID=4L6g3nShT-eMCtK--X86sw
    networks:
      - bgd_projekt
    ports:
      - "9092:9092"

  kafka-source-producer:
    build:
      context: .
      dockerfile: Dockerfile.kafka
    container_name: bgd_kafka_source_producer
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=flights.ingest.request
      - SOURCE_DIR=/app/data/source
      - STATE_FILE=/app/data/kafka/producer_state.json
      - POLL_SECONDS=10
    depends_on:
      - kafka
    networks:
      - bgd_projekt
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    command: python -u src/kafka_source_producer.py
    restart: unless-stopped

  kafka-airflow-trigger:
    build:
      context: .
      dockerfile: Dockerfile.kafka
    container_name: bgd_kafka_airflow_trigger
    env_file:
      - ./.env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=flights.ingest.request
      - KAFKA_GROUP_ID=airflow-trigger-consumer
      - AIRFLOW_BASE_URL=http://airflow-webserver:8080
      - AIRFLOW_DAG_ID=medallion_airline_pipeline_kafka
      - AIRFLOW_USERNAME=${AIRFLOW_ADMIN_USER:-admin}
      - AIRFLOW_PASSWORD=${AIRFLOW_ADMIN_PASSWORD:-admin}
    depends_on:
      - kafka
      - airflow-webserver
    networks:
      - bgd_projekt
    volumes:
      - ./src:/app/src
    command: python -u src/kafka_airflow_trigger.py
    restart: unless-stopped

  airflow-init:
    image: apache/airflow:3.2.0
    container_name: bgd_airflow_init
    env_file:
      - ./.env
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bgd_db}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/src/dags
      - AIRFLOW__LOGGING__BASE_LOG_FOLDER=/opt/airflow/data/airflow/logs
      - AIRFLOW__API__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY:-change_me}
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      - AIRFLOW_UID=${AIRFLOW_UID:-50000}
      - POSTGRES_HOST=postgres
      - PYTHONPATH=/opt/airflow:/opt/airflow/src
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bgd_projekt
    volumes:
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
    command:
      - bash
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username $${AIRFLOW_ADMIN_USER:-admin} \
          --password $${AIRFLOW_ADMIN_PASSWORD:-admin} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    restart: "no"

  airflow-webserver:
    image: apache/airflow:3.2.0
    container_name: bgd_airflow_webserver
    env_file:
      - ./.env
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bgd_db}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/src/dags
      - AIRFLOW__LOGGING__BASE_LOG_FOLDER=/opt/airflow/data/airflow/logs
      - AIRFLOW__API__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY:-change_me}
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      - AIRFLOW_UID=${AIRFLOW_UID:-50000}
      - POSTGRES_HOST=postgres
      - PYTHONPATH=/opt/airflow:/opt/airflow/src
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bgd_projekt
    volumes:
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
    ports:
      - "8081:8080"
    command: api-server

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: bgd_airflow_scheduler
    env_file:
      - ./.env
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bgd_db}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/src/dags
      - AIRFLOW__LOGGING__BASE_LOG_FOLDER=/opt/airflow/data/airflow/logs
      - AIRFLOW__API__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY:-change_me}
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      - AIRFLOW_UID=${AIRFLOW_UID:-50000}
      - POSTGRES_HOST=postgres
      - PYTHONPATH=/opt/airflow:/opt/airflow/src
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bgd_projekt
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
    command: scheduler

  airflow-dag-processor:
    image: apache/airflow:3.2.0
    container_name: bgd_airflow_dag_processor
    env_file:
      - ./.env
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bgd_db}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/src/dags
      - AIRFLOW__LOGGING__BASE_LOG_FOLDER=/opt/airflow/data/airflow/logs
      - AIRFLOW__API__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY:-change_me}
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      - AIRFLOW_UID=${AIRFLOW_UID:-50000}
      - POSTGRES_HOST=postgres
      - PYTHONPATH=/opt/airflow:/opt/airflow/src
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bgd_projekt
    volumes:
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
    command: dag-processor

networks:
  bgd_projekt:
    driver: bridge
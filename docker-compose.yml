services:
  postgres:
    image: postgres:15-alpine
    container_name: bgd_postgres
    env_file:
      - ./.env
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=4", "-c", "max_wal_senders=4"]
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d
    networks:
      - bgd_projekt
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bgd_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bgd_pgadmin
    env_file:
      - ./.env
    ports:
      - "8080:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bgd_projekt
    volumes:
      - ./data/pgadmin:/var/lib/pgadmin

  pyspark:
    build:
      context: .
      dockerfile: Dockerfile.pyspark
    container_name: bgd_pyspark
    env_file:
      - ./.env
    environment:
      - POSTGRES_HOST=postgres
      - JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64
      - PATH=/usr/lib/jvm/java-21-openjdk-amd64/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bgd_projekt
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    command: sleep infinity

  airflow-init:
    image: apache/airflow:3.2.0
    container_name: bgd_airflow_init
    env_file:
      - ./.env
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bgd_db}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/src/dags
      - AIRFLOW__LOGGING__BASE_LOG_FOLDER=/opt/airflow/data/airflow/logs
      - AIRFLOW__API__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY:-change_me}
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      - AIRFLOW_UID=${AIRFLOW_UID:-50000}
      - POSTGRES_HOST=postgres
      - PYTHONPATH=/opt/airflow:/opt/airflow/src
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bgd_projekt
    volumes:
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
    command:
      - bash
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username $${AIRFLOW_ADMIN_USER:-admin} \
          --password $${AIRFLOW_ADMIN_PASSWORD:-admin} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    restart: "no"

  airflow-webserver:
    image: apache/airflow:3.2.0
    container_name: bgd_airflow_webserver
    env_file:
      - ./.env
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bgd_db}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/src/dags
      - AIRFLOW__LOGGING__BASE_LOG_FOLDER=/opt/airflow/data/airflow/logs
      - AIRFLOW__API__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY:-change_me}
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      - AIRFLOW_UID=${AIRFLOW_UID:-50000}
      - POSTGRES_HOST=postgres
      - PYTHONPATH=/opt/airflow:/opt/airflow/src
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bgd_projekt
    volumes:
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
    ports:
      - "8081:8080"
    command: api-server

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: bgd_airflow_scheduler
    env_file:
      - ./.env
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bgd_db}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/src/dags
      - AIRFLOW__LOGGING__BASE_LOG_FOLDER=/opt/airflow/data/airflow/logs
      - AIRFLOW__API__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY:-change_me}
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      - AIRFLOW_UID=${AIRFLOW_UID:-50000}
      - POSTGRES_HOST=postgres
      - PYTHONPATH=/opt/airflow:/opt/airflow/src
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bgd_projekt
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
    command: scheduler

  airflow-dag-processor:
    image: apache/airflow:3.2.0
    container_name: bgd_airflow_dag_processor
    env_file:
      - ./.env
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bgd_db}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/src/dags
      - AIRFLOW__LOGGING__BASE_LOG_FOLDER=/opt/airflow/data/airflow/logs
      - AIRFLOW__API__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY:-change_me}
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      - AIRFLOW_UID=${AIRFLOW_UID:-50000}
      - POSTGRES_HOST=postgres
      - PYTHONPATH=/opt/airflow:/opt/airflow/src
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bgd_projekt
    volumes:
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
    command: dag-processor

networks:
  bgd_projekt:
    driver: bridge